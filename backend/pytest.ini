[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
log_cli = false
log_cli_level = WARNING
filterwarnings =
    ignore::DeprecationWarning:psycopg.*
    ignore::DeprecationWarning:flask_limiter.*
